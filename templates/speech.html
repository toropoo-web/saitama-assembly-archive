<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>議事録詳細</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<main class="detail-container">

    <a class="back-link" href="/?q={{ keyword }}#results">
        ← 検索結果へ戻る
    </a>

    <article class="speech-detail-card">

        <p class="meta">
            {{ row["meeting_date"] }} / {{ row["meeting_name"] }}
        </p>

        <h1 class="detail-speaker">
            {{ row["speaker_name"] }}
        </h1>

        <div class="speech-body">
            {{ highlighted_body|safe }}
        </div>

    </article>

    {% if keyword %}
    <section class="related-news-section">
        <h2>このテーマの地域ニュースを見る</h2>

        <div class="news-links">
            <a href="https://news.yahoo.co.jp/search?p={{ news_query }}" target="_blank">
                Yahooニュース
            </a>

            <a href="https://www.google.com/search?q={{ news_query }}&tbm=nws" target="_blank">
                Googleニュース
            </a>

            <a href="https://www.saitama-np.co.jp/search?keyword={{ news_query }}" target="_blank">
                埼玉新聞
            </a>
        </div>
    </section>

    
    {% endif %}

</main>

<script>
window.addEventListener("load", function () {
    const firstMark = document.querySelector("mark");

    if (firstMark) {
        firstMark.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }
});
</script>

</body>
</html>
